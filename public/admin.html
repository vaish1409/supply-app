<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Bulk & Institutional Supply</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
  .admin-wrap{ max-width:960px; margin:0 auto; padding:60px 24px 100px; }
  .login-box{ max-width:400px; margin:100px auto; background:var(--bg-2); border:1px solid var(--line); padding:40px; }
  .tabs{ display:flex; gap:10px; margin-bottom:36px; }
  .tab-btn{ font-family:'JetBrains Mono'; font-size:12px; letter-spacing:0.1em; padding:10px 18px; border:1px solid var(--line); color:var(--muted); cursor:pointer; background:none; }
  .tab-btn.active{ background:var(--gold-bright); color:var(--bg); border-color:var(--gold-bright); font-weight:700; }
  .panel{ display:none; }
  .panel.active{ display:block; }
  .list-row{ display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding:14px 0; font-size:14px; }
  .list-row .meta{ color:var(--muted); font-family:'JetBrains Mono'; font-size:12px; }
  .list-row .del{ font-family:'JetBrains Mono'; font-size:11px; color:var(--muted); cursor:pointer; }
  .list-row .del:hover{ color:var(--crimson-bright); }
  .order-card{ border:1px solid var(--line); padding:18px; margin-bottom:14px; }
  .order-top{ display:flex; justify-content:space-between; margin-bottom:8px; }
  .order-items{ font-family:'JetBrains Mono'; font-size:12px; color:var(--muted); line-height:1.7; }
  select.status-select{ background:var(--bg); border:1px solid var(--line); color:var(--cream); padding:6px 10px; font-family:'JetBrains Mono'; font-size:12px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <div class="brand" onclick="location.href='/'">
      <div class="brand-mark">SC</div>
      <div>
        <div class="brand-name">Admin Panel</div>
        <div class="brand-sub">CATALOG · ORDERS · SETTINGS</div>
      </div>
    </div>
    <div id="navRight">
      <button class="btn btn-outline" onclick="logout()" id="logoutBtn" style="display:none">Log out</button>
    </div>
  </div>
</nav>

<div id="loginPanel" class="login-box">
  <h3 class="display" style="font-size:22px; margin-bottom:20px;">Admin login</h3>
  <div class="form-grid">
    <div class="field"><label>Username</label><input id="loginUser"></div>
    <div class="field"><label>Password</label><input id="loginPass" type="password"></div>
  </div>
  <div class="error-msg" id="loginError"></div>
  <button class="btn btn-gold btn-block" style="margin-top:16px" onclick="login()">Log in</button>
</div>

<div id="dashboard" class="admin-wrap" style="display:none">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('catalog')">Catalog</button>
    <button class="tab-btn" onclick="showTab('orders')">Orders</button>
  </div>

  <div id="tab-catalog" class="panel active">
    <h3 class="display" style="font-size:22px; margin-bottom:20px;">Add an item</h3>
    <form id="productForm" class="form-grid two" style="margin-bottom:40px;">
      <div class="field"><label>Item name</label><input id="pName" required></div>
      <div class="field"><label>Category</label>
        <select id="pCategory"><option>Food</option><option>Apparel</option><option>Gear</option><option>Equipment</option></select>
      </div>
      <div class="field"><label>Price per unit (₹)</label><input id="pPrice" type="number" step="0.01" required></div>
      <div class="field"><label>Unit label</label><input id="pUnit" placeholder="kg, unit, kit…" required></div>
      <div class="field"><label>Amount per person</label><input id="pPerPerson" type="number" step="0.01" required></div>
      <div class="field"><label>Minimum order quantity</label><input id="pMinQty" type="number" step="0.01" value="1"></div>
      <div class="field" style="grid-column:1/-1"><label>Description (optional)</label><textarea id="pDescription" rows="2"></textarea></div>
      <div class="field" style="grid-column:1/-1"><label>Product image (optional, jpg/png/webp, max 5MB)</label><input id="pImage" type="file" accept=".jpg,.jpeg,.png,.webp"></div>
      <div style="grid-column:1/-1">
        <div class="error-msg" id="productError"></div>
        <button type="submit" class="btn btn-gold" id="productSubmitBtn">Add to catalog</button>
      </div>
    </form>

    <h3 class="display" style="font-size:20px; margin-bottom:16px;">Current catalog (<span id="catalogCount">0</span>)</h3>
    <div id="catalogList"></div>
  </div>

  <div id="tab-orders" class="panel">
    <h3 class="display" style="font-size:22px; margin-bottom:20px;">Orders (<span id="orderCount">0</span>)</h3>
    <div id="orderList"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/admin.js"></script>
</body>
</html>
